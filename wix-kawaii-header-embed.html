<div id="ks-subpage-header" class="ks-subpage-header">
  <style>
    #ks-subpage-header,
    #ks-subpage-header * {
      box-sizing: border-box;
    }

    #ks-subpage-header {
      --ks-ink: #403753;
      --ks-muted: #756b8c;
      --ks-line: #4a3f63;
      --ks-shadow: #b8acd0;
      --ks-pink: #ffd5e8;
      --ks-pink-strong: #f6a9cc;
      --ks-lavender: #eee8ff;
      --ks-blue: #e7f6ff;
      --ks-mint: #dcfff2;
      --ks-paper: #fffefe;
      --ks-grid: rgba(174, 161, 201, .18);
      width: 100%;
      max-width: 1220px;
      margin: 0 auto;
      padding: clamp(10px, 2vw, 18px);
      color: var(--ks-ink);
      font-family: "Trebuchet MS", "Verdana", system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.45;
      overflow: auto;
      scrollbar-width: none;
      background:
        linear-gradient(var(--ks-grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--ks-grid) 1px, transparent 1px),
        linear-gradient(135deg, #fff7fb 0%, #f5f0ff 44%, #eef9ff 100%);
      background-size: 22px 22px, 22px 22px, auto;
      border: 3px solid #8d83aa;
      box-shadow: 7px 7px 0 var(--ks-shadow);
    }

    #ks-subpage-header::-webkit-scrollbar,
    #ks-subpage-header *::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    #ks-subpage-header a {
      color: inherit;
      text-decoration: none;
    }

    #ks-subpage-header .ks-window {
      overflow: hidden;
      border: 3px solid var(--ks-line);
      background: rgba(255, 255, 255, .76);
      box-shadow: 6px 6px 0 var(--ks-shadow);
    }

    #ks-subpage-header .ks-title-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 42px;
      padding: 8px 12px;
      border-bottom: 3px solid var(--ks-line);
      background: linear-gradient(90deg, #dce9ff 0%, #ffe0f3 100%);
      font-weight: 900;
      letter-spacing: .01em;
    }

    #ks-subpage-header .ks-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      font-size: clamp(17px, 2.3vw, 24px);
      white-space: nowrap;
    }

    #ks-subpage-header .ks-dot {
      width: 14px;
      height: 14px;
      border: 2px solid var(--ks-line);
      background: var(--ks-pink-strong);
      box-shadow: inset 2px 2px 0 rgba(255, 255, 255, .75);
    }

    #ks-subpage-header .ks-buttons {
      display: inline-flex;
      gap: 8px;
      flex: 0 0 auto;
    }

    #ks-subpage-header .ks-buttons span {
      width: 22px;
      height: 22px;
      border: 3px solid var(--ks-line);
      background: #fff;
      box-shadow: inset 3px 3px 0 #f3eefc;
    }

    #ks-subpage-header .ks-hero {
      display: grid;
      grid-template-columns: minmax(230px, .72fr) minmax(0, 1.28fr);
      gap: clamp(12px, 2vw, 20px);
      align-items: stretch;
      padding: clamp(12px, 2vw, 22px);
    }

    #ks-subpage-header .ks-photo-card,
    #ks-subpage-header .ks-info-card,
    #ks-subpage-header .ks-links-card {
      border: 2px solid rgba(143, 134, 168, .9);
      background: rgba(255, 254, 254, .86);
      box-shadow: inset 3px 3px 0 rgba(255, 255, 255, .9), inset -3px -3px 0 rgba(214, 203, 235, .55);
    }

    #ks-subpage-header .ks-photo-card {
      display: grid;
      gap: 12px;
      padding: 12px;
      align-content: start;
    }

    #ks-subpage-header .ks-photo-frame {
      position: relative;
      overflow: hidden;
      aspect-ratio: 1 / 1;
      border: 3px solid var(--ks-line);
      background: linear-gradient(135deg, var(--ks-blue), #fff);
      box-shadow: inset 5px 5px 0 rgba(255, 255, 255, .85);
    }

    #ks-subpage-header .ks-photo-frame img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #ks-subpage-header .ks-photo-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      padding: 8px 10px;
      border: 2px solid #d49bbb;
      background: linear-gradient(#fff9fc, #ffe5f1);
      color: #654f75;
      font-weight: 900;
    }

    #ks-subpage-header .ks-photo-chip span {
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      width: 32px;
      height: 32px;
      border: 2px solid #f1aacb;
      background: #fff;
      color: #9c6386;
      font-size: 13px;
    }

    #ks-subpage-header .ks-mini-nav {
      display: grid;
      gap: 8px;
    }

    #ks-subpage-header .ks-main-button,
    #ks-subpage-header .ks-social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 12px;
      border: 3px solid var(--ks-line);
      background: linear-gradient(#fff, #f5f1ff);
      box-shadow: 5px 5px 0 var(--ks-shadow);
      color: var(--ks-ink);
      font-weight: 900;
      text-align: center;
      transition: transform .16s ease, background .16s ease, box-shadow .16s ease;
    }

    #ks-subpage-header .ks-main-button:hover,
    #ks-subpage-header .ks-main-button:focus-visible,
    #ks-subpage-header .ks-social-link:hover,
    #ks-subpage-header .ks-social-link:focus-visible {
      transform: translate(-2px, -2px);
      background: linear-gradient(#fff7fb, #ffd5e8);
      box-shadow: 7px 7px 0 var(--ks-shadow);
      outline: none;
    }

    #ks-subpage-header .ks-main-button:nth-child(1) {
      background: linear-gradient(#fff8fc, #ffd5e8);
    }

    #ks-subpage-header .ks-main-button:nth-child(2) {
      background: linear-gradient(#fbf8ff, #eee8ff);
    }

    #ks-subpage-header .ks-main-button:nth-child(3) {
      background: linear-gradient(#f8ffff, #dcfff2);
    }

    #ks-subpage-header .ks-right {
      display: grid;
      grid-template-rows: auto auto;
      align-content: start;
      gap: 12px;
      min-width: 0;
    }

    #ks-subpage-header .ks-info-card {
      padding: clamp(14px, 2vw, 22px);
    }

    #ks-subpage-header .ks-site-link {

      width: fit-content;
      max-width: 100%;
      margin-bottom: 10px;
      padding: 5px 12px;
      border: 2px solid #f1aacb;
      background: #fff7fb;
      color: #80617a;
      font-size: 13px;
      font-weight: 900;
      word-break: break-word;
    }

    #ks-subpage-header h1 {
      margin: 0;
      color: #44375b;
      font-size: clamp(34px, 7vw, 76px);
      line-height: .95;
      letter-spacing: 0;
      text-shadow: 3px 3px 0 #ffd5e8, 6px 6px 0 #c9c0df;

    #ks-subpage-header .ks-subtitle {

      max-width: 780px;
      color: #665c7d;
      font-size: clamp(17px, 2.1vw, 23px);

    #ks-subpage-header .ks-lower-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      align-items: start;
    }

    #ks-subpage-header .ks-profile-facts,
    #ks-subpage-header .ks-links-card {
      padding: 12px;
    }

    #ks-subpage-header .ks-profile-facts {

      overflow-x: auto;
      scrollbar-width: none;

    #ks-subpage-header .ks-fact span {

    #ks-subpage-header .ks-subtitle {
      max-width: 100%;
      font-size: clamp(18px, 1.7vw, 23px);
    }

    #ks-subpage-header .ks-profile-facts {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      overflow: visible;
    }

    #ks-subpage-header .ks-fact {

      min-width: 0;
    }

    #ks-subpage-header .ks-fact strong,
    #ks-subpage-header .ks-fact span {

      word-break: normal;
    }

    #ks-subpage-header .ks-links-card {
      grid-template-columns: auto minmax(0, 1fr);
      padding: 14px;
    }

    #ks-subpage-header .ks-links-card h2 {
      font-size: clamp(18px, 2vw, 24px);
    }

    #ks-subpage-header .ks-social-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    @media (max-width: 820px) {
      #ks-subpage-header {
        padding: 10px;
        box-shadow: 5px 5px 0 var(--ks-shadow);

      #ks-subpage-header .ks-hero {

      #ks-subpage-header .ks-photo-card {
        grid-template-columns: minmax(110px, 150px) minmax(0, 1fr);
        align-items: start;
      }

      #ks-subpage-header .ks-photo-chip {
        grid-column: 1 / -1;
      }

      #ks-subpage-header .ks-links-card {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      #ks-subpage-header {
        border-width: 2px;
      }

      #ks-subpage-header .ks-title {
        white-space: normal;
      }

      #ks-subpage-header .ks-buttons span {
        width: 18px;
        height: 18px;
      }

      #ks-subpage-header .ks-photo-card {
        grid-template-columns: 1fr;
      }

      #ks-subpage-header .ks-photo-frame {
        max-width: 230px;
        margin: 0 auto;
        width: 100%;
      }

      #ks-subpage-header .ks-profile-facts {
        grid-template-columns: repeat(4, minmax(112px, 1fr));
      }

      #ks-subpage-header .ks-social-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
